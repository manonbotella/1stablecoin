<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Stablecoins & Les Banques Françaises</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;font-family:'Segoe UI',Arial,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px 16px 76px}
/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,22,40,.97);border-top:2px solid #0D9488;display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 20px;z-index:999}
#nav button{background:#0D9488;border:none;color:white;width:36px;height:36px;border-radius:6px;font-size:16px;cursor:pointer;transition:background .15s}
#nav button:hover{background:#14B8A6}
#nav button:disabled{background:#1e3a5f;color:#475569;cursor:default}
#ctr{color:#94A3B8;font-size:13px;font-family:'Courier New',monospace;min-width:60px;text-align:center}
.dots{display:flex;gap:6px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:#334155;cursor:pointer;transition:all .2s}
.dot.on{background:#0D9488;transform:scale(1.5)}
/* WRAPPER */
.sw{display:none;width:100%;max-width:1280px}
.sw.on{display:block}
.slbl{color:#64748B;font-size:11px;font-family:'Courier New',monospace;text-align:center;padding:4px 0 8px;letter-spacing:.05em}
.slide{width:100%;aspect-ratio:16/9;position:relative;overflow:hidden;border-radius:10px;box-shadow:0 24px 64px rgba(0,0,0,.7)}
/* SHARED */
.hdr{position:absolute;top:0;left:0;right:0;height:13%;background:#0A1628;display:flex;align-items:center;padding:0 4%}
.hdr h2{font-size:clamp(10px,1.75vw,22px);font-weight:900;color:white;font-family:Arial Black,Arial,sans-serif;letter-spacing:.02em}
.hln{position:absolute;bottom:0;left:0;right:0;height:3px}
.hic{position:absolute;right:3%;top:50%;transform:translateY(-50%);font-size:clamp(15px,2.3vw,28px)}
.bd{position:absolute;top:15%;left:3%;right:3%;bottom:1%}

/* SLIDE 1 */
#s1{background:#0A1628}
#s1 .lb{position:absolute;left:0;top:0;width:1.6%;height:100%;background:#0D9488}
#s1 .tb{position:absolute;left:1.6%;top:0;right:0;height:.5%;background:#F59E0B}
#s1 .ct{position:absolute;left:5%;top:7%;right:22%}
#s1 .t1{font-size:clamp(26px,5.4vw,70px);font-weight:900;color:white;letter-spacing:-.02em;line-height:1;font-family:Arial Black,Arial,sans-serif}
#s1 .t2{font-size:clamp(11px,2vw,26px);font-weight:700;color:#14B8A6;letter-spacing:.1em;margin-top:1%}
#s1 .gb{width:50%;height:3px;background:#F59E0B;margin-top:3%;border-radius:2px}
#s1 .tg{color:#94A3B8;font-size:clamp(8px,.95vw,12px);margin-top:1.5%;font-style:italic}
#s1 .plan{display:grid;grid-template-columns:1fr 1fr;gap:.8% 4%;margin-top:3%;max-width:80%}
#s1 .pi{color:#F1F5F9;font-size:clamp(7px,.9vw,11.5px);padding:.8% 0 .8% 3%;border-left:2px solid #0D9488}
#s1 .coins{position:absolute;right:3%;top:8%;display:flex;flex-direction:column;align-items:center;gap:3%;width:16%}
#s1 .coin{width:75%;aspect-ratio:1;border-radius:50%;background:linear-gradient(135deg,#FCD34D,#F59E0B,#D97706);box-shadow:0 4px 20px rgba(245,158,11,.4),inset 0 -3px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:clamp(13px,2.1vw,28px);font-weight:900;color:#0A1628}
#s1 .ft{position:absolute;bottom:0;left:0;right:0;height:7%;background:#1E3A5F;display:flex;align-items:center;padding:0 5%;color:#94A3B8;font-size:clamp(7px,.82vw,10.5px);font-family:'Courier New',monospace}

/* SLIDE 2 */
#s2{background:#F8FAFC}
.def{background:#1E3A5F;color:white;border-radius:7px;padding:2% 3%;font-size:clamp(7.5px,.95vw,12px);font-style:italic;line-height:1.5;margin-bottom:2%}
